<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; margin: 0; background: #f5f5f5; }
    h2 { margin: 0 0 12px; font-size: 15px; text-align: center; color: #333; font-weight: 600; }
    .btn { width: 100%; padding: 10px; margin: 6px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
    .start { background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%); color: white; box-shadow: 0 2px 4px rgba(76,175,80,0.3); }
    .start:hover:not(:disabled) { background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%); }
    .start:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
    .stop { background: linear-gradient(135deg, #f44336 0%, #e31c1c 100%); color: white; box-shadow: 0 2px 4px rgba(244,67,54,0.3); }
    .stop:hover:not(:disabled) { background: linear-gradient(135deg, #e31c1c 0%, #c62828 100%); }
    .stop:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
    #status { font-size: 12px; text-align: center; padding: 8px; border-radius: 6px; margin-top: 8px; font-weight: 500; }
    .running { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); color: #2e7d32; border: 1px solid #4CAF50; }
    .stopped { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); color: #c62828; border: 1px solid #f44336; }
    .info { font-size: 11px; color: #666; margin-top: 10px; text-align: center; background: #fff; padding: 8px; border-radius: 6px; }
    .info span { color: #2196F3; font-weight: 500; }
    #msg { font-size: 11px; color: #f44336; text-align: center; margin-top: 6px; min-height: 16px; }
  </style>
</head>
<body>
  <h2>智慧树刷课助手</h2>
  <button id="start" class="btn start">开始刷课</button>
  <button id="stop" class="btn stop" disabled>停止刷课</button>
  <div id="status" class="stopped">状态: 已停止</div>
  <div id="msg"></div>
  <div class="info">
    <span>自动播放</span> | <span>1.5倍速</span> | <span>静音</span><br>
    自动跳过弹窗，自动下一集
  </div>
  <script src="popup.js"></script>
</body>
</html>
